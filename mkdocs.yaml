site_name: PlotNado Documentation
nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Build Tracks Fast: quickstart_tracks.md
  - Track Catalog: track_catalog.md
  - Figure Workflows: figure_workflows.md
  - Recipes: recipes.md
  - Data Inputs: data_inputs.md
  - CLI: cli.md
  - Track Aliases: track_aliases.md
  - API Reference: api_reference.md
  - Aesthetics Reference: aesthetics_reference.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
  - Reference Summary: reference/SUMMARY.md

theme:
  name: mkdocs
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - mkdocs-click
  - admonition
  - codehilite:
      guess_lang: false

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
  - literate-nav:
      nav_file: SUMMARY.md
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - mkdocs-jupyter:
      include:
        - "*.ipynb"
      execute: false

hooks:
  - scripts/mkdocs_hooks.py

repo_url: https://github.com/alsmith151/plotnado

validation:
  nav:
    omitted_files: ignore