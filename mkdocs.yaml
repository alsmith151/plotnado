site_name: PlotNado Documentation
site_description: Publication-ready genome browser figures in Python.
nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Track Construction: quickstart_tracks.md
  - Guides:
      - Track Catalog: track_catalog.md
      - Data Inputs: data_inputs.md
      - Figure Workflows: figure_workflows.md
      - Aesthetics: aesthetics.md
      - Recipes: recipes.md
      - Best Practices: best_practices.md
  - Reference:
      - Overview: reference.md
      - API Reference: api_reference.md
      - Track Aliases: track_aliases.md
      - Example Coverage: example_coverage.md
  - CLI:
      - CLI Guide: cli.md
  - Examples:
      - Worked Examples: worked_examples.ipynb
      - Basic Notebook: basic_example.ipynb
  - Help:
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
  - Meta:
      - Changelog: changelog.md

theme:
  name: material
  logo: images/Logo.jpeg
  favicon: images/Logo.jpeg
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - mkdocs-click
  - admonition
  - codehilite:
      guess_lang: false
extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocs-jupyter:
      include:
        - "*.ipynb"
      execute: false

hooks:
  - scripts/mkdocs_hooks.py

repo_url: https://github.com/alsmith151/plotnado
repo_name: alsmith151/plotnado
edit_uri: edit/main/docs/

validation:
  nav:
    omitted_files: ignore
extra:
  generator: false
