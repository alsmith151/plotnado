name: Run Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install OS dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential zlib1g-dev libcurl4-openssl-dev tabix
        # Libraries needed for pybedtools and other bioinformatics tools
        sudo apt install -y bedtools libhts-dev samtools

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-cov
        # Install numpy and cython first as they're required for building some dependencies
        pip install numpy cython
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # Install ICED (for HiC matrix balancing) as done in the docs workflow
        git clone https://github.com/hiclib/iced.git
        cd iced
        for fn in $(find . -iname "*.pyx"); do cython $fn; done
        pip install . -v
        cd ..
        rm -rf iced
        
        # Install the package itself in development mode
        pip install -e . -v

    - name: Run tests
      run: |
        pytest tests/ -v --cov=plotnado

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
