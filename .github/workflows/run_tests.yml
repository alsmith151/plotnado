name: Run Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install OS dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential zlib1g-dev libcurl4-openssl-dev tabix
        # Libraries needed for pybedtools and other bioinformatics tools
        sudo apt install -y bedtools libhts-dev samtools

    - name: Install dependencies
      run: |
        pip install uv
        uv pip install . pytest pytest-cov
    - name: Run tests
      run: |
        pytest tests/ -v --cov=plotnado

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
