<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-labelledby="title desc">
  <title id="title">PlotNado logo</title>
  <desc id="desc">A tornado-shaped mark built from genomic browser track ribbons with the PlotNado wordmark.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="swirlA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="swirlB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect x="8" y="10" width="116" height="116" rx="20" fill="url(#sky)"/>

  <path d="M20 36 C36 28, 76 28, 102 36 C84 44, 56 46, 20 36Z" fill="url(#swirlA)"/>
  <path d="M30 54 C44 48, 74 48, 94 54 C80 60, 56 62, 30 54Z" fill="url(#swirlB)"/>
  <path d="M38 72 C50 68, 72 68, 86 72 C74 77, 58 78, 38 72Z" fill="url(#swirlA)"/>
  <path d="M46 90 C55 87, 68 87, 78 90 C68 94, 58 95, 46 90Z" fill="url(#swirlB)"/>
  <path d="M54 106 C58 104, 62 104, 66 106 C62 110, 58 110, 54 106Z" fill="#e0f2fe"/>

  <circle cx="82" cy="35" r="3" fill="#ffffff"/>
  <circle cx="67" cy="55" r="3" fill="#ffffff"/>
  <circle cx="61" cy="73" r="2.8" fill="#ffffff"/>

  <text x="150" y="84" font-family="Menlo, Monaco, Consolas, monospace" font-size="44" font-weight="700" fill="#0f172a">PlotNado</text>
  <text x="152" y="106" font-family="Menlo, Monaco, Consolas, monospace" font-size="12" fill="#334155">genomic browser-style plots</text>
</svg>
